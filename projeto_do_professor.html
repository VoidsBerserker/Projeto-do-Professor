<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro Moderno</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="form-container">
        <h1>Crie sua Conta</h1>
        <p>Preencha os dados abaixo para acessar a plataforma de desenvolvimento.</p>

        <form action="#" method="POST">
            <fieldset>
                <legend>Dados Pessoais</legend>

                <div class="form-group">
                    <label for="nome">Nome Completo</label>
                    <input type="text" id="nome" name="nome" placeholder="Ex: Ana Silva" required>
                </div>

                <div class="form-group">
                    <label for="email">E-mail Corporativo</label>
                    <input type="email" id="email" name="email" placeholder="email@exemplo.com" required>
                </div>
            </fieldset>

            <fieldset>
                <legend>Preferências de Jogo</legend>

                <div class="form-group">
                    <label for="categoria">Categoria Favorita</label>
                    <select id="categoria" name="categoria">
                        <option value="acao">Ação / Combate</option>
                        <option value="terror">Terror / Suspense</option>
                        <option value="rpg">RPG</option>
                        <option value="simulacao">Simulação de Veículos</option>
                    </select>
                </div>

                <div class="form-group checkbox-group">
                    <input type="checkbox" id="termos" name="termos" required>
                    <label for="termos">Aceito os termos e condições de uso.</label>
                </div>
            </fieldset>

            <button type="submit" class="btn-submit">Finalizar Cadastro</button>
        </form>
    </main>

</body>
</html>
